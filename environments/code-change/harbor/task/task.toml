schema_version = "1.1"

[task]
name = "flarbor/code-change-harbor"
description = "PR-replay benchmark: clone a repo at a pre-PR commit, re-implement the PR via LLM-driven code changes, then verify against the known-good diff. Harbor equivalent of Flarbor's code-change environment."
authors = [{ name = "Flarbor", email = "dev@flarbor.dev" }]
keywords = ["pr-replay", "code-change", "llm", "git", "benchmark"]

[metadata]
difficulty_explanation = "Depends on the PR being replayed (set via TASK_ID)"
category = "code-modification"
flarbor_equivalent = "environments/code-change/flarbor"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 300.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
allow_internet = true
# Runtime env vars — set these when running `harbor run`
# TASK_ID is required; others are optional.
# GITHUB_TOKEN is intentionally NOT passed into the container env —
# it is only needed by the host-side run.sh for clone/push.
env = { TASK_ID = "${TASK_ID}", BRANCH = "${BRANCH}", AUTHOR_NAME = "${AUTHOR_NAME}", AUTHOR_EMAIL = "${AUTHOR_EMAIL}", MAX_STEPS = "${MAX_STEPS}" }
